# ═══════════════════════════════════════════════════════════════════
# KAMPAGNEN-KONFIGURATION
# ═══════════════════════════════════════════════════════════════════

name: "Kanzleien – Mobile Optimierung"
subject: "Hinweis zur mobilen Darstellung Ihrer Website"

# CSV-Datei mit Kontakten (relativ zum Kampagnen-Ordner)
contacts: "contacts.csv"

# Template-Variante (optional, Standard: default)
# template_variant: "minimal"

# ═══════════════════════════════════════════════════════════════════
# ANSCHREIBEN-INHALT
# ═══════════════════════════════════════════════════════════════════

content:
  # Anrede – Platzhalter: {{KANZLEINAME}}, {{ANREDE}}, {{NAME}}, etc.
  greeting: "Sehr geehrte Damen und Herren der Kanzlei <strong style=\"color:#a78bfa;\">{{KANZLEINAME}}</strong>,"

  # Einleitung
  intro: |
    bei der Nutzung Ihrer Website 
    <a href="{{DOMAIN}}" style="color:#818cf8;text-decoration:none;border-bottom:1px solid #818cf8;">{{DOMAIN}}</a> 
    auf mobilen Endgeräten ist mir folgende Problematik aufgefallen:

  # Highlight-Box (z.B. Problem, Angebot, etc.)
  highlight: "{{PROBLEM}}"

  # Haupttext – mehrere Absätze
  body:
    - "Da ein erheblicher Teil der Mandantensuche über Smartphones erfolgt, kann eine eingeschränkte mobile Darstellung den professionellen Gesamteindruck Ihrer Kanzlei beeinträchtigen."
    - "Ich habe mich auf die <strong style=\"color:#d4d4d8;\">technische Optimierung von Kanzlei-Websites</strong> spezialisiert – mit Fokus auf mobile Performance und barrierefreie Darstellung."
    - "Gerne zeige ich Ihnen unverbindlich auf, welche Anpassungen sinnvoll wären – ob durch gezielte Korrekturen oder einen strukturellen Relaunch."

  # Call-to-Action Button
  cta:
    text: "Unverbindlich anfragen →"
    url: "https://obscuras-media-agency.de/kontakt"

# ═══════════════════════════════════════════════════════════════════
# PLAINTEXT-VERSION
# ═══════════════════════════════════════════════════════════════════

plaintext: |
  Sehr geehrte Damen und Herren der Kanzlei {{KANZLEINAME}},

  bei der Nutzung Ihrer Website ({{DOMAIN}}) auf Smartphones und Tablets ist mir folgende Problematik aufgefallen:

  "{{PROBLEM}}"

  Da ein erheblicher Teil der Mandantensuche über Smartphones erfolgt, kann eine eingeschränkte mobile Darstellung den professionellen Gesamteindruck Ihrer Kanzlei beeinträchtigen.

  Ich habe mich auf die technische Optimierung von Kanzlei-Websites spezialisiert – mit Fokus auf mobile Performance und barrierefreie Darstellung.

  Gerne zeige ich Ihnen unverbindlich auf, welche Anpassungen sinnvoll wären – ob durch gezielte Korrekturen oder einen strukturellen Relaunch.

  ---

  Mit freundlichen Grüßen

  Sascha Gebel
  Gründer & Entwickler

  Obscuras Media Agency
  Digitale Softwarelösungen
  https://obscuras-media-agency.de
